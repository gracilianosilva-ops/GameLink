{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 card text-dark p-4 mt-5">
        <h3 class="text-center">Recuperar Acesso</h3>
        {% if not token_gerado %}
        <form method="POST" action="{{ url_for('recuperar') }}">
            <div class="mb-3">
                <label>Informe seu E-mail</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning w-100">Solicitar Código</button>
        </form>
        {% else %}
        <form method="POST" action="{{ url_for('redefinir') }}">
            <input type="hidden" name="email" value="{{ email }}">
            <div class="mb-3">
                <label>Insira o Token Recebido</label>
                <input type="text" name="token" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Nova Senha</label>
                <input type="password" name="nova_senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Alterar Senha</button>
        </form>
        {% endif %}
    </div>
</div>
{% endblock %}
