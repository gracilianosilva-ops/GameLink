{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card bg-secondary text-white p-4">
            <h2 class="mb-4">✏️ Editar Perfil</h2>
            
            <form action="{{ url_for('salvar_perfil') }}" method="POST">
                <div class="mb-3">
                    <label for="nome" class="form-label">📝 Nome Completo</label>
                    <input type="text" class="form-control" id="nome" name="nome" value="{{ usuario.nome }}" required>
                </div>

                <div class="mb-3">
                    <label for="idade" class="form-label">🎂 Idade</label>
                    <input type="number" class="form-control" id="idade" name="idade" min="13" max="120" value="{{ usuario.idade or '' }}" placeholder="Digite sua idade">
                </div>

                <div class="mb-3">
                    <label for="gosto_jogos" class="form-label">🎮 Gosto de Jogos</label>
                    <textarea class="form-control" id="gosto_jogos" name="gosto_jogos" rows="3" placeholder="Ex: Adoro RPGs e jogos de ação, prefiro Single Player...">{{ usuario.gosto_jogos }}</textarea>
                    <small class="text-muted">Descreva seus gostos e preferências em jogos</small>
                </div>

                <div class="mb-3">
                    <label for="telefone" class="form-label">📱 Telefone</label>
                    <input type="tel" class="form-control" id="telefone" name="telefone" value="{{ usuario.telefone or '' }}" placeholder="(XX) XXXXX-XXXX">
                </div>

                <hr>

                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">🏠 Página Inicial</a>
                    <a href="{{ url_for('perfil', email=session['user_email']) }}" class="btn btn-secondary">❌ Cancelar</a>
                    <button type="submit" class="btn btn-primary">💾 Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
