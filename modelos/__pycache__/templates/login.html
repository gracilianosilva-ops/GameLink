{% extends 'base.html' %}
{% block content %}
<div class="login-page-shell">
    <div class="login-topbar mb-5">
        <div class="login-topbar-brand">🎮 GameLink</div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">
            <div class="card login-card text-dark p-4">
                <h3 class="text-center mb-4">Login</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label>E-mail</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Senha</label>
                        <input type="password" name="senha" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('cadastro') }}">Criar Conta</a> | <a href="{{ url_for('recuperar') }}">Esqueci a Senha</a>
                </div>
                <hr>
                <small class="text-muted">Dica de professor: Entre com <strong>admin@gamelink.com</strong> e senha <strong>admin123</strong> para simular o CRUD de gerenciamento de jogos!</small>
            </div>
        </div>
    </div>
</div>

<style>
    .login-page-shell {
        min-height: calc(100vh - 2rem);
        padding: 1.5rem 0 2rem;
    }

    .login-topbar {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
    }

    .login-topbar-brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.8rem 1.35rem;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(10, 18, 34, 0.82);
        box-shadow: 0 16px 30px rgba(0, 0, 0, 0.22);
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: #e5eefb;
        letter-spacing: -0.02em;
    }

    .login-card {
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.14);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    }

    .login-card h3 {
        color: #f8fbff;
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        text-shadow: 0 2px 14px rgba(56, 189, 248, 0.18);
    }

    .login-card label {
        color: #dce9f8;
        font-weight: 600;
    }

    .login-card .form-control {
        background: rgba(7, 17, 31, 0.96);
        color: #f8fbff;
        border-color: rgba(148, 163, 184, 0.26);
    }

    .login-card .form-control:focus {
        background: rgba(7, 17, 31, 0.96);
        color: #f8fbff;
        border-color: rgba(56, 189, 248, 0.72);
        box-shadow: 0 0 0 0.2rem rgba(56, 189, 248, 0.14);
    }

    .login-card a {
        color: #7dd3fc;
        text-decoration: none;
    }

    .login-card a:hover {
        color: #bae6fd;
        text-decoration: underline;
    }
</style>
{% endblock %}
